services:
  postgres:
    image: postgres:17
    container_name: shopsphere-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: shopsphere_admin
      POSTGRES_PASSWORD: shopsphere_password
      POSTGRES_DB: shopsphere

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopsphere_admin -d shopsphere"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .

    container_name: shopsphere-api

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql://shopsphere_admin:shopsphere_password@postgres:5432/shopsphere

    ports:
      - "8000:8000"

    restart: unless-stopped

volumes:
  postgres_data: